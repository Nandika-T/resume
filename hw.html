<!DOCTYPE html>
<html>
<head>
<title>Student Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center text-primary mb-4">Student Manager</h2>

<div class="row mb-3">

<div class="col">
<input type="text" id="name" class="form-control" placeholder="Student Name">
</div>

<div class="col">
<input type="text" id="dept" class="form-control" placeholder="Department">
</div>

<div class="col">
<input type="number" id="age" class="form-control" placeholder="Age">
</div>

<div class="col">
<button class="btn btn-success" onclick="addStudent()">Add</button>
</div>

</div>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>S.No</th>
<th>Name</th>
<th>Department</th>
<th>Age</th>
<th>Edit</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let count = 1;

function addStudent(){

let name = document.getElementById("name").value;
let dept = document.getElementById("dept").value;
let age = document.getElementById("age").value;

if(name=="" || dept=="" || age==""){
alert("Fill all fields");
return;
}

let row = `
<tr>
<td>${count++}</td>
<td>${name}</td>
<td>${dept}</td>
<td>${age}</td>

<td>
<button class="btn btn-warning btn-sm"
onclick="editRow(this)">Edit</button>
</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="deleteRow(this)">Delete</button>
</td>
</tr>`;

document.getElementById("tableBody").innerHTML += row;

document.getElementById("name").value="";
document.getElementById("dept").value="";
document.getElementById("age").value="";
}

function editRow(btn){

let row = btn.parentNode.parentNode;

let name = prompt("Edit Name", row.cells[1].innerHTML);
let dept = prompt("Edit Department", row.cells[2].innerHTML);
let age = prompt("Edit Age", row.cells[3].innerHTML);

if(name && dept && age){
row.cells[1].innerHTML = name;
row.cells[2].innerHTML = dept;
row.cells[3].innerHTML = age;
}
}

function deleteRow(btn){
btn.parentNode.parentNode.remove();
}

</script>

</body>
</html>
